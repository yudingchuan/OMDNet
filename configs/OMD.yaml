# trainer settings
work_dir: '' # experiment directory.

#############
# dataset
#############
patch_size: 256 # training patch size
force_blur_region_p: 0.7
data_dir: /data/yudc/OMoBlur_dataset

#########
# train and eval
#########
num_ckpt_keep: 3
tb_log_interval: 10

val_check_interval: 2
ckpt_save_interval: 2

max_updates: 1000000
batch_size: 8
lr: 0.0001
eval_batch_size: 1

num_workers: 0 ##
multiple_width: 4

# MultiStepLR_milestones: [30, 50, 80, 100, 120, 150, 170, 200, 220, 240, 260, 280, 300, 340, 360, 400, 420, 460, 500, 530, 560, 600, 650, 700, 750, 800, 850, 900]
MultiStepLR_milestones: [30, 50, 80, 100, 120, 150, 170, 200, 220, 240, 260, 280, 300, 340, 360, 400]
# loss function coefficient
lambda_warp: 0.05
lambda_merge: 0.4
lambda_r: 1.0
lambda_g: 0.4

lambda_l1: 1.0
lambda_fft: 0.1


